name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Summarize is local-first video summarization. 

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What pain does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, other tools, or lighter-weight options

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the video summarization / NotebookLM-alternative niche
          required: true
        - label: I am willing to help implement or test
          required: false
