# Summarizer Configuration
# Copy to ./summarizer.yaml or run: python -m summarizer --init-config

default_provider: groq

providers:
  groq:
    base_url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile

  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    model: google/gemini-3.5-flash

  deepseek:
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat

  openai:
    base_url: https://api.openai.com/v1
    model: gpt-5.5

  nvidia:
    base_url: https://integrate.api.nvidia.com/v1
    model: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning

  openrouter:
    base_url: https://openrouter.ai/api/v1
    model: google/gemini-3.1-flash-lite

  # OpenRouter base64 visual mode: downloads video, splits into temporal chunks,
  # and sends each chunk as base64. Works with any video-capable OpenRouter model.
  openrouter-gemini-video:
    base_url: https://openrouter.ai/api/v1
    model: google/gemini-3.1-flash-lite
    visual-provider: openrouter
    visual-api-style: openai-video-url
    visual-input-mode: base64
    visual-max-duration-seconds: 120
    visual-max-size-mb: 100

  # OpenRouter URL visual mode: sends the original YouTube URL directly.
  # Only for supported hosts (youtube.com, youtu.be). No download or splitting.
  openrouter-gemini-youtube:
    base_url: https://openrouter.ai/api/v1
    model: google/gemini-3.1-flash-lite
    visual-provider: openrouter
    visual-api-style: openai-video-url
    visual-input-mode: url
    visual-supported-url-hosts: [youtube.com, youtu.be]

  perplexity:
    base_url: https://openrouter.ai/api/v1
    model: perplexity/sonar
    chunk-size: 128000

  litellm-anthropic:
    base_url: litellm
    model: anthropic/claude-sonnet-4-6

  litellm-groq:
    base_url: litellm
    model: groq/llama-3.3-70b-versatile

defaults:
  prompt-type: Questions and answers
  chunk-size: 10000
  parallel-calls: 30
  max-tokens: 4096
  output-language: auto
  audio-speed: 1.0
  use-proxy: false
  output-dir: summaries
  keep-history: false
  cobalt-base-url: http://localhost:9000
  cache-transcript: true
  visual: false
  visual-compression: off
  visual-chunk-seconds: auto
  visual-chunk-overlap-seconds: 0
  visual-synthesis: false
  # visual-max-size-mb: 100
  # visual-max-duration-seconds: 120
